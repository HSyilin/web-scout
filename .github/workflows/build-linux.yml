name: Build Linux Package

on:
  workflow_dispatch:
    inputs:
      upload_to_release:
        description: 'Upload deb to GitHub Release (tag name, e.g. v2.0.0). Leave empty to skip.'
        required: false
        default: 'v2.0.0'
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Linux deb
        run: npx electron-builder --linux --publish never

      - name: List build output
        run: |
          ls -la dist/ 2>/dev/null || true
          find dist -name "*.deb" -exec ls -la {} \;

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-scout-linux-deb
          path: dist/*.deb
          retention-days: 90
          if-no-files-found: error

      - name: Determine release tag
        id: reltag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.inputs.upload_to_release }}" >> $GITHUB_OUTPUT
          fi

      - name: Upload to Release
        if: steps.reltag.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.reltag.outputs.tag }}
          files: dist/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
