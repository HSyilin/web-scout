<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebScout 控制台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a1a;color:#eee;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;overflow:hidden}
.header{text-align:center;margin-bottom:50px}
.header h1{font-size:38px;font-weight:700;background:linear-gradient(135deg,#e94560,#4fc3f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:10px}
.header p{font-size:15px;color:#666}
.modules{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;max-width:960px;width:100%}
.module-card{background:#12122e;border:1px solid #2a2a5a;border-radius:16px;padding:36px 24px;cursor:pointer;transition:all .3s ease;display:flex;flex-direction:column;align-items:center;text-align:center;position:relative;overflow:hidden}
.module-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),transparent);opacity:0;transition:opacity .3s}
.module-card:hover{transform:translateY(-6px);border-color:var(--accent);box-shadow:0 12px 40px rgba(0,0,0,.4)}
.module-card:hover::before{opacity:1}
.module-card:nth-child(1){--accent:#e94560}
.module-card:nth-child(2){--accent:#4fc3f7}
.module-card:nth-child(3){--accent:#81c784}
.module-icon{font-size:44px;margin-bottom:18px}
.module-title{font-size:19px;font-weight:600;margin-bottom:10px;color:#fff}
.module-desc{font-size:13px;color:#888;line-height:1.6;margin-bottom:18px}
.module-tag{font-size:11px;padding:4px 12px;border-radius:12px;background:rgba(255,255,255,.05);color:#aaa}
.stats{margin-top:50px;display:flex;gap:48px;text-align:center}
.stat-value{font-size:26px;font-weight:700;color:#e94560}
.stat-label{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.footer{margin-top:36px;font-size:11px;color:#444}
</style>
</head>
<body>
<div class="header">
  <h1>WebScout 控制台</h1>
  <p>可视化智能资源提取器</p>
</div>
<div class="modules">
  <div class="module-card" onclick="openModule('scraper')">
    <div class="module-icon">🎯</div>
    <div class="module-title">可视化抓取</div>
    <div class="module-desc">智能识别网页中的图片、视频、音频、链接和文本资源，支持批量导出</div>
    <div class="module-tag">核心功能</div>
  </div>
  <div class="module-card" onclick="openModule('wsw-editor')">
    <div class="module-icon"></div>
    <div class="module-title">WSW 编辑器</div>
    <div class="module-desc">自由画布式演示文件编辑器，支持拖拽、缩放、网格吸附，可导出为独立 HTML</div>
    <div class="module-tag">演示制作</div>
  </div>
  <div class="module-card" onclick="openModule('workflow')">
    <div class="module-icon">🤖</div>
    <div class="module-title">抓取信息卡片</div>
    <div class="module-desc">记录抓取过程，生成训练数据，构建可被 AI 识别的资源提取工作流</div>
    <div class="module-tag">AI 训练</div>
  </div>
</div>
<div class="stats">
  <div><div class="stat-value" id="statScrapes">0</div><div class="stat-label">抓取次数</div></div>
  <div><div class="stat-value" id="statWSW">0</div><div class="stat-label">WSW 文件</div></div>
  <div><div class="stat-value" id="statWorkflows">0</div><div class="stat-label">工作流</div></div>
</div>
<div class="footer">WebScout v1.0.0 · Built with TRAE</div>
<script>
async function loadStats(){
  try{
    const stats=await window.electronAPI.getDashboardStats();
    if(stats.success){
      document.getElementById('statScrapes').textContent=stats.data.scrapes||0;
      document.getElementById('statWSW').textContent=stats.data.wswFiles||0;
      document.getElementById('statWorkflows').textContent=stats.data.workflows||0;
    }
  }catch(e){console.log('Stats load failed:',e)}
}
function openModule(module){
  if(window.electronAPI&&window.electronAPI.openModule){
    window.electronAPI.openModule(module);
  }else{
    const paths={'scraper':'index.html','wsw-editor':'wsw-editor.html','workflow':'workflow.html'};
    window.location.href=paths[module]||'index.html';
  }
}
loadStats();
</script>
</body>
</html>
